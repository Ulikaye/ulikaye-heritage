{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Family Map | Ulikaye Heritage</title>
  <!-- Leaflet CSS + JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0f19;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 500;
      background: rgba(10, 15, 25, 0.6);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo-container { display: flex; align-items: center; gap: 10px; }
    .logo-text { font-weight: bold; letter-spacing: 1px; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { text-decoration: none; color: #ddd; padding: 8px 14px; border-radius: 10px; transition: 0.3s; }
    .nav-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .map-container {
      flex: 1;
      margin-top: 70px;
      position: relative;
    }
    #map {
      width: 100%;
      height: 100%;
      background: #2a2f3e; /* fallback */
    }
    .info-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 0.8rem;
      z-index: 10;
      pointer-events: none;
      font-family: monospace;
    }
    @media (max-width: 768px) {
      .info-panel { font-size: 0.7rem; bottom: 10px; right: 10px; }
    }
  </style>
</head>
<body>
<header>
  <div class="logo-container"><img src="{% static 'heritage/images/logo.PNG' %}" alt="Logo" style="height: 96px; width: auto;"><div class="logo-text">Family Map</div></div>
  <div class="nav-links"><a href="{% url 'home' %}">Dashboard</a><form method="post" action="{% url 'logout' %}" style="display: inline;">
    {% csrf_token %}
    <button type="submit" style="background: none; border: none; color: #ddd; padding: 8px 14px; cursor: pointer;">Logout</button>
</form></div>
</header>

<div class="map-container">
  <div id="map"></div>
  <div class="info-panel" id="mapInfo">📍 Iringa, Mufindi – Heart of Ulikaye Heritage</div>
</div>

<script>
  // Coordinates for Mufindi, Tanzania (approximate center)
  const MUFINDI = [-8.5833, 35.2500];  // Leaflet uses [lat, lng]
  
  function initMap() {
    const map = L.map('map').setView(MUFINDI, 12);
    
    // Add OpenStreetMap tiles (free, no API key)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
      subdomains: 'abcd',
      maxZoom: 19,
      minZoom: 6
    }).addTo(map);
    
    // Add a marker at Mufindi
    const marker = L.marker(MUFINDI, { draggable: false }).addTo(map);
    marker.bindPopup('<strong>Mufindi, Iringa</strong><br>Roots of the Ulikaye family').openPopup();
  }
  
  // Wait for DOM to load
  document.addEventListener('DOMContentLoaded', initMap);
  
  // Logo canvas
  const canvas = document.getElementById("logoCanvas");
  const ctx = canvas.getContext("2d");
<img src="{% static 'heritage/images/logo.PNG' %}" alt="Logo" style="height: 96px; width: auto;">
</script>
</body>
</html>
