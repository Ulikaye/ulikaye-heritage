{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Ulikaye Heritage</title>
  <style>
    body {
      margin: 0;
      background: #0b0f19;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .glass-card {
      background: rgba(12,16,28,0.8);
      backdrop-filter: blur(18px);
      padding: 40px;
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.12);
      width: 320px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #1e2a3a;
      border: none;
      border-radius: 24px;
      color: white;
    }
    button {
      background: #1f6feb;
      border: none;
      padding: 12px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
    }
    .error {
      color: #f66;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="glass-card">
  <h2>Ulikaye Heritage</h2>
  <form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" autofocus>
    <input type="password" name="password" placeholder="Password">
    <button type="submit">Login</button>
    {% if form.errors %}
      <div class="error">Invalid username or password.</div>
      <a href="{% url 'register' %}">No account? Register with invitation code</a>
    {% endif %}
  </form>
</div>
</body>
</html>
